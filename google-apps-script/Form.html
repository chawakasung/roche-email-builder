<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Roche · Media Registration</title>
<style>
  :root {
    --roche-blue: #0B41CD;
    --roche-blue-dark: #022366;
    --fg-1: #1a1a1a;
    --fg-2: #544F4F;
    --fg-3: #706B69;
    --hairline: rgba(10,16,32,0.18);
    --bg: #f7f5f2;
    --card: #ffffff;
    --red: #d6002a;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); font-family: Arial, "Helvetica Neue", sans-serif; color: var(--fg-1); }
  .wrap { max-width: 640px; margin: 0 auto; padding: 32px 20px 64px; }
  .card { background: var(--card); padding: 32px 28px; border: 1px solid var(--hairline); }
  .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
  .logo svg { width: 60px; height: auto; }
  .eyebrow { font-size: 11px; color: var(--fg-3); letter-spacing: 0.12em; text-transform: uppercase; }
  h1 { font-weight: 300; font-size: 28px; line-height: 1.15; margin: 0 0 8px; letter-spacing: -0.01em; }
  .lede { color: var(--fg-2); font-size: 14px; line-height: 1.55; margin: 0 0 24px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid .full { grid-column: 1 / -1; }
  @media (max-width: 520px) { .grid { grid-template-columns: 1fr; } }
  label { display: block; font-size: 11px; color: var(--fg-2); margin: 0 0 6px; letter-spacing: 0.04em; }
  label .req { color: var(--red); }
  input[type="text"], input[type="email"] {
    width: 100%;
    height: 40px;
    padding: 0 12px;
    font-family: inherit;
    font-size: 14px;
    color: var(--fg-1);
    background: #fff;
    border: 1px solid var(--hairline);
    border-radius: 0;
    outline: none;
    transition: border-color .15s;
  }
  input:focus { border-color: var(--roche-blue); }
  input.is-invalid { border-color: var(--red); }
  .check { display: flex; align-items: flex-start; gap: 10px; margin: 12px 0; font-size: 12px; color: var(--fg-2); line-height: 1.5; cursor: pointer; }
  .check input { margin-top: 3px; flex-shrink: 0; }
  .actions { margin-top: 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  button[type="submit"] {
    appearance: none; -webkit-appearance: none;
    border: 0; background: var(--roche-blue); color: #fff;
    padding: 12px 28px; font-family: inherit; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: background .15s;
    letter-spacing: 0.02em;
  }
  button[type="submit"]:hover { background: var(--roche-blue-dark); }
  button[type="submit"][disabled] { opacity: 0.5; cursor: not-allowed; }
  .privacy { font-size: 11px; color: var(--fg-3); margin: 18px 0 0; line-height: 1.5; }
  .privacy a { color: var(--roche-blue); }
  .msg { margin-top: 16px; padding: 12px 16px; border-radius: 0; font-size: 13px; }
  .msg.ok { background: #e8f3ee; color: #00563f; border-left: 3px solid #00875a; }
  .msg.err { background: #fbeaec; color: #7a0017; border-left: 3px solid var(--red); }
  .done { text-align: center; padding: 32px 16px; }
  .done svg { color: #00875a; }
  .done h2 { font-weight: 300; font-size: 24px; margin: 16px 0 8px; }
  .done p { color: var(--fg-2); margin: 0; }
</style>
</head>
<body>
<div class="wrap">
  <div class="card" id="card">
    <div class="logo">
      <svg viewBox="0 0 800 415.8" xmlns="http://www.w3.org/2000/svg">
        <path fill="#0B41CD" d="M653.7,183c-3.6-7.4-8.7-13-15.2-17s-14-6-22.4-6s-15.9,2-22.4,6s-11.6,9.7-15.2,17c-3.6,7.4-5.4,16-5.4,25.8v22.1c0,9.8,1.8,18.4,5.4,25.8c3.6,7.4,8.7,13,15.2,17s14,5.9,22.4,5.9s15.9-2,22.4-5.9c6.5-4,10.5-8.5,14.1-15.9c1.7-3.5,3.2-7.9,4-12.4l-20.6-4.7c-0.9,4.4-2.4,8.6-4.7,11.5c-3.7,4.8-9.1,6.9-15.2,6.9c-6.1,0-11.5-2.2-15.2-6.9c-3.7-4.8-5.5-11.6-5.5-20v-8.3h63.8v-15.2C659.1,198.9,657.3,190.4,653.7,183z M616.1,180.5c6.1,0,11.5,2.1,15.2,6.8c3.3,4.2,5.1,10.6,5.5,17.9h-41.4c0.3-7.3,2.1-13.7,5.5-17.9C604.5,182.6,609.9,180.5,616.1,180.5z"/>
        <path fill="#0B41CD" d="M494.8,277v-75.4c0-6.3,1.8-11.4,5.3-15.1c3.6-3.7,8-5.6,13.5-5.6c5.4,0,9.9,1.9,13.5,5.6c3.6,3.7,5.3,8.7,5.3,15.1V277h22.3v-80.1c0-11.6-3-20.6-9-27.1s-14.2-9.7-24.6-9.7c-5.7,0-10.8,1.1-15.6,3.4c-4.7,2.3-8.5,5.3-10.6,8.5v-57.3h-22.3V277H494.8z"/>
        <path fill="#0B41CD" d="M392.8,232c0,8.4,1.9,15.2,5.6,19.9c3.8,4.7,9.2,6.8,15.3,6.8c11,0,17.9-7.1,20.5-21.2l20.7,4.8c-1.7,11.8-6,21-12.9,27.5s-16.3,9.8-28.3,9.8c-13,0-23.5-4.4-31.4-13.2c-7.9-8.8-11.9-20.8-11.9-35.8V209c0-15,3.9-27,11.9-35.8c7.9-8.8,18.4-13.2,31.4-13.2c12,0,21.4,3.3,28.3,9.8s11.2,15.7,12.9,27.5l-20.7,4.8c-2.6-14.1-9.4-21.2-20.5-21.2c-6.1,0-11.6,2.1-15.3,6.8c-3.8,4.7-5.6,11.4-5.6,19.9V232z"/>
        <path fill="#0B41CD" d="M310.3,258.7c-6.1,0-11.5-2.2-15.2-6.9c-3.7-4.8-5.5-11.6-5.5-20v-24.2c0-8.4,1.8-15.2,5.5-19.9s9.1-6.8,15.2-6.8s11.5,2.1,15.2,6.8s5.5,11.4,5.5,19.9v24.2c0,8.4-1.8,15.2-5.5,20C321.8,256.6,316.4,258.7,310.3,258.7 M310.3,279.7c8.4,0,15.9-2,22.4-5.9c6.5-4,11.6-9.7,15.2-17c3.6-7.4,5.4-16,5.4-25.8v-22.1c0-9.8-1.8-18.4-5.4-25.8c-3.6-7.4-8.7-13-15.2-17s-14-6-22.4-6s-15.9,2-22.4,6s-11.6,9.7-15.2,17c-3.6,7.4-5.4,16-5.4,25.8V231c0,9.8,1.8,18.4,5.4,25.8c3.6,7.4,8.7,13,15.2,17C294.4,277.7,301.9,279.7,310.3,279.7"/>
        <path fill="#0B41CD" d="M190.9,183.2v-47.3h22.5c6,0,10.7,1.9,14,5.8c3.3,3.9,5,9.8,5,17.9c0,8-1.7,14-5,17.9s-8,5.8-14,5.8L190.9,183.2L190.9,183.2z M190.9,277v-72.4H210c5.5,0,9.1,1.3,11.5,3.8s3.7,6.5,4.4,12.2l6.3,56.4h22.4l-6.7-58.5c-0.8-7-1.7-11.6-4.5-15.7c-2.6-3.7-6.3-6.8-10.6-8.2c6.8-3.2,12.2-7.8,16.1-13.6c3.9-5.8,5.9-13.8,5.9-24c0-13.1-3.7-23.5-11-31.1c-7.4-7.6-17.5-11.4-30.3-11.4h-44.8V277H190.9z"/>
        <path fill="#0B41CD" d="M800,207.9L619.3,415.8H180.7L0,207.9L180.7,0h438.5L800,207.9z M609.6,394.7L772,207.9L609.6,21.1H190.3L28,207.9l162.3,186.8H609.6z"/>
      </svg>
    </div>
    <p class="eyebrow">Media Registration</p>
    <h1>Sign up to receive Roche updates</h1>
    <p class="lede">Fill in your details below. We'll be in touch shortly.</p>

    <form id="form" novalidate>
      <div class="grid">
        <div>
          <label>Name <span class="req">*</span></label>
          <input type="text" name="name" required>
        </div>
        <div>
          <label>Surname <span class="req">*</span></label>
          <input type="text" name="surname" required>
        </div>
        <div>
          <label>Position / Specialty</label>
          <input type="text" name="position">
        </div>
        <div>
          <label>Organization</label>
          <input type="text" name="org">
        </div>
        <div class="full">
          <label>Email <span class="req">*</span></label>
          <input type="email" name="email" required>
        </div>
        <div class="full">
          <label>Medical Technician ID</label>
          <input type="text" name="medid">
        </div>
      </div>

      <label class="check">
        <input type="checkbox" name="chk1">
        <span>I would like to receive information from Roche.</span>
      </label>
      <label class="check">
        <input type="checkbox" name="chk2">
        <span>I agree to allow Roche to use and store the personal data provided by me to send me marketing communications. I understand and agree that Roche's news and marketing emails utilize technical functionalities to track email deliverability and engagement for targeting purposes and to improve the user experience.</span>
      </label>

      <div class="actions">
        <button type="submit" id="submit">Submit</button>
        <p class="privacy" style="margin:0;">By clicking submit, you agree to Roche's <a href="https://www.roche.com/privacy-policy" target="_blank" rel="noopener">Privacy Policy</a>.</p>
      </div>

      <div class="msg err" id="err" style="display:none;"></div>
    </form>
  </div>

  <div class="card done" id="done" style="display:none;">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="9 12 11 14 15 10"/></svg>
    <h2>Thanks — we got it.</h2>
    <p>Your registration has been recorded. We'll be in touch by email.</p>
  </div>
</div>

<script>
  const form = document.getElementById('form');
  const submitBtn = document.getElementById('submit');
  const errBox = document.getElementById('err');
  const card = document.getElementById('card');
  const done = document.getElementById('done');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errBox.style.display = 'none';
    [...form.querySelectorAll('input.is-invalid')].forEach(i => i.classList.remove('is-invalid'));

    const data = {};
    let invalid = false;
    [...form.elements].forEach(el => {
      if (!el.name) return;
      if (el.type === 'checkbox') data[el.name] = el.checked;
      else data[el.name] = el.value.trim();
      if (el.required && !el.value.trim()) {
        el.classList.add('is-invalid');
        invalid = true;
      }
      if (el.type === 'email' && el.value.trim() && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(el.value)) {
        el.classList.add('is-invalid');
        invalid = true;
      }
    });
    if (invalid) {
      errBox.textContent = 'Please fill in all required fields with valid values.';
      errBox.style.display = 'block';
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Sending…';

    try {
      const r = await fetch(window.location.href, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
      const out = await r.json();
      if (!out.ok) throw new Error(out.error || 'Submission failed');
      card.style.display = 'none';
      done.style.display = 'block';
    } catch (err) {
      errBox.textContent = 'Something went wrong: ' + err.message;
      errBox.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Submit';
    }
  });
</script>
</body>
</html>
